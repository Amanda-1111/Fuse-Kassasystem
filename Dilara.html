<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Streckkod Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
}

#scanner{
  width:400px;
  margin:auto;
}

#result{
  font-size:24px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>Scanna streckkod</h2>

<div id="scanner"></div>

<div id="result">Väntar på scanning...</div>

<script>

let lastCode = null;
let sameCount = 0;
const requiredMatches = 3;

// ===== MATERIAL DATABAS =====
const materials = {
    "123456789": {
        name: "Trä",
        type: "Byggmaterial",
        location: "Lager A"
    },
    "987654321": {
        name: "Stål",
        type: "Metall",
        location: "Lager B"
    },
    "555666777": {
        name: "Plast",
        type: "Polymer",
        location: "Lager C"
    }
};

Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector('#scanner'),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: [
      "ean_reader",
      "ean_8_reader",
      "code_128_reader",
      "upc_reader"
    ]
  }
}, function(err) {
  if (err) {
    console.log(err);
    return;
  }
  Quagga.start();
});

Quagga.onDetected(function(data) {

  let code = data.codeResult.code;

  if(code === lastCode){
      sameCount++;
  } else {
      sameCount = 0;
      lastCode = code;
  }

  if(sameCount >= requiredMatches){

      let resultHTML = "";

      if(materials[code]){

          const material = materials[code];

          resultHTML = `
          <h3>Material hittat</h3>
          <p><b>Barcode:</b> ${code}</p>
          <p><b>Namn:</b> ${material.name}</p>
          <p><b>Typ:</b> ${material.type}</p>
          <p><b>Plats:</b> ${material.location}</p>
          `;

      } else {

          resultHTML = `
          <h3>Okänd kod</h3>
          <p>${code}</p>
          `;

      }

      document.getElementById("result").innerHTML = resultHTML;

      Quagga.stop();
      document.getElementById("scanner").innerHTML = "";
  }

});

</script>

</body>
</html>
