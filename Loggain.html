<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuse Login</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    height: 100vh;
    padding-top: 80px; /* Fuse högst upp */
}

/* Titel */
h1 {
    font-size: 36px;
    font-weight: bold;
    color: #000;
    margin-bottom: 40px;
    text-align: center;
}

/* Form-element */
input {
    width: 300px;
    max-width: 90%;
    padding: 14px;
    margin-bottom: 20px;
    border: 2px solid #000;
    border-radius: 8px;
    font-size: 16px;
}

input:focus {
    outline: none;
    border-color: #0066ff;
}

/* Log in knapp */
.login-btn {
    width: 300px;
    max-width: 90%;
    padding: 14px;
    background: #1d1d1f;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 12px;
}

/* Forgot password knapp */
.forgot {
    width: 300px;
    max-width: 90%;
    padding: 12px;
    background: white;
    color: black;
    border: 2px solid #000;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

/* Responsiv mobilanpassning */
@media (max-width: 500px) {
    h1 {
        font-size: 30px;
    }
    input, .login-btn, .forgot {
        width: 90%;
        font-size: 16px;
    }
}
</style>
</head>
<body>

<h1>Fuse</h1>

<input type="text" placeholder="Text field in empty state">
<input type="password" placeholder="Text field in empty state">

<button class="login-btn">Log in</button>
<button class="forgot">Forgot password?</button>

</body>
</html>
